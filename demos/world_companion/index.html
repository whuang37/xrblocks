<!doctype html>
<html lang="en">
  <head>

      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="../../samples/main.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "../../build/xrblocks.js",
          "xrblocks/addons/": "../../build/addons/",
          "@google/genai": "https://cdn.jsdelivr.net/npm/@google/genai/+esm",
          "marked": "https://esm.sh/marked@14",
          "dompurify": "https://esm.sh/dompurify@3"
        }
      }
    </script>
    <style>
      .panel {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: rgba(20, 20, 20, 0.85);
        padding: 14px 18px;
        border-radius: 12px;
        font-family: system-ui, sans-serif;
        color: #eee;
        max-width: 540px;

      }
      .panel button {
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #2a2a2a;
        color: white;
        cursor: pointer;
        font-size: 14px;
        text-transform: none;
      }
      .panel button:hover:not(:disabled) {

        opacity: 0.4;

      }
      .panel .row {

      .panel .start {

      }
      .panel .stop {
        background: #c0392b;
      }
      .panel .transcript {
        height: 80px;
        overflow-y: auto;

        padding: 8px 10px;
        background: #111;
        border-radius: 8px;
      }
      .panel .transcript p,
      .panel .transcript ul,
      .panel .transcript ol {
        margin: 0 0 0.4em 0;
      }
      .panel .transcript ul,
      .panel .transcript ol {
        padding-left: 1.2em;
      }
      .panel .transcript:empty::before {
        content: 'Press Start, then talk to the companion. It can see what the camera sees.';
        color: #888;

      }
      .panel .status {
        font-size: 12px;
        color: #aaa;
      }
      .key-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;

      .key-card {
        background: #1a1a1a;

      .key-card h2 {

      }
      .key-card p {
        margin: 0 0 16px;
        font-size: 13px;
        color: #aaa;

      .key-card a {

  <body>
    <div id="keyOverlay" class="key-overlay" style="display: none">
      <div class="key-card">
        <h2>Gemini API key</h2>
        <p>
          This demo needs a Gemini API key with Live API access. Get one from
          <a
            href="https://aistudio.google.com/app/apikey"
            target="_blank"
            rel="noopener"
            >aistudio.google.com</a
          >. The key is saved in your browser's localStorage and only sent to
          Google.
        </p>
        <input id="keyInput" type="password" placeholder="AIza..." />
        <button id="keySave">save and reload</button>
      </div>
    </div>

    <script>
      // Resolve gemini key: ?key= URL param > localStorage > ./keys.json > overlay.
      (async function () {
        const STORAGE_KEY = 'gemini-api-key';
        const params = new URLSearchParams(window.location.search);
        if (params.has('key')) {
          window.localStorage.setItem(STORAGE_KEY, params.get('key'));
          return;
        }
        const stored = window.localStorage.getItem(STORAGE_KEY);
        if (stored) {
          params.set('key', stored);
          const newUrl =
            window.location.pathname +
            '?' +
            params.toString() +
            window.location.hash;
          window.history.replaceState(null, '', newUrl);
          return;
        }
        try {
          const res = await fetch('./keys.json', {cache: 'no-store'});
          if (res.ok) {
            const k = (await res.json()).key;
            if (k) {
              window.localStorage.setItem(STORAGE_KEY, k);
              params.set('key', k);
              window.location.search = '?' + params.toString();
              return;
            }
          }
        } catch (_) {
          // no keys.json, fall through to overlay
        }
        const overlay = document.getElementById('keyOverlay');
        const input = document.getElementById('keyInput');
        const save = document.getElementById('keySave');
        overlay.style.display = 'flex';
        const submit = () => {
          const k = input.value.trim();
          if (!k) return;
          window.localStorage.setItem(STORAGE_KEY, k);
          params.set('key', k);
          window.location.search = '?' + params.toString();
        };
        save.addEventListener('click', submit);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') submit();
        });
        input.focus();
      })();
    </script>

    <div class="panel" id="panel">
      <div class="row">
        <button class="start" id="start">Start companion</button>
        <button class="stop" id="stop" disabled>Stop</button>
        <button id="clear">Clear labels</button>
      </div>
      <div class="transcript" id="transcript"></div>
      <div class="status" id="status">idle</div>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import {Text} from 'troika-three-text';
      import {marked} from 'marked';
      import DOMPurify from 'dompurify';

      const startBtn = document.getElementById('start');
      const stopBtn = document.getElementById('stop');
      const clearBtn = document.getElementById('clear');
      const transcriptEl = document.getElementById('transcript');
      const statusEl = document.getElementById('status');

      const labels = new THREE.Group();
      let session = null;
      let transcriptBuffer = '';
      let xrStatusText = null;

      function setStatus(s) {
        statusEl.textContent = s;
        if (xrStatusText) xrStatusText.text = s;
      }
      function appendTranscript(t) {
        transcriptBuffer += t;
        transcriptEl.innerHTML = DOMPurify.sanitize(
          marked.parse(transcriptBuffer)
        );
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function makeTools() {
        const placeLabel = new xb.Tool({
          name: 'placeLabel',
          description:
            'Drop one or more labels. Pass items[] to mark several things at ' +
            'once (e.g. ["mug","laptop","keys"]). Each item is anchored to a ' +
            'matching detected object; if no match is found the item is ' +
            'skipped (no marker placed) and reported back with ' +
            '`anchored: false, reason: "not_found"` so you can tell the user ' +
            'you could not see it. Choose a style per item: "dot" for casual ' +
            'noting, "arrow" when pointing something out, "pulse" for small ' +
            'or hard-to-spot things.',
          parameters: {
            type: 'OBJECT',
            properties: {
              items: {
                type: 'ARRAY',
                description:
                  'Labels to place. Use multiple entries to mark several ' +
                  'objects at once instead of calling the tool repeatedly.',
                items: {
                  type: 'OBJECT',
                  properties: {
                    text: {
                      type: 'STRING',
                      description: 'Short label, ~3 words.',
                    },
                    style: {
                      type: 'STRING',
                      enum: ['dot', 'arrow', 'pulse'],
                      description: 'Marker style. Defaults to dot.',
                    },
                  },
                  required: ['text'],
                },
              },
              text: {
                type: 'STRING',
                description:
                  'Single-label shortcut. Prefer items[] for one or more.',
              },
              style: {
                type: 'STRING',
                enum: ['dot', 'arrow', 'pulse'],
                description: 'Style for the single-label shortcut.',
              },
            },
          },
          onTriggered: async ({items, text, style}) => {
            const stripQuotes = (k) => k.replace(/^['"]+|['"]+$/g, '');
            const normItem = (it) => {
              if (!it || typeof it !== 'object') return it;
              const out = {};
              for (const [k, v] of Object.entries(it)) {
                out[stripQuotes(k)] = v;
              }
              return out;
            };
            let list = Array.isArray(items) ? items.map(normItem) : [];
            if (text) list.push({text, style});
            if (!list.length) {
              return {success: false, error: 'no items provided'};
            }

            const callKey = list
              .map((it) => (it.text || '').toLowerCase().trim())
              .sort()
              .join('|');
            const now = performance.now();
            if (
              placeLabel._lastKey === callKey &&
              now - (placeLabel._lastAt || 0) < 2000
            ) {
              return (
                placeLabel._lastResult || {
                  success: true,
                  data: {placed: [], detected: []},
                }
              );
            }
            placeLabel._lastKey = callKey;
            placeLabel._lastAt = now;

            let detected = [];
            try {
              if (xb.core.world?.objects) {
                detected = await xb.core.world.objects.runDetection();
              }
            } catch (e) {
              console.warn('[placeLabel] detection threw', e);
            }
            if (xrStatusText) {
              const want = list.map((it) => it.text).join(',');
              const got = detected.map((d) => d.label).join(',') || '(none)';
              xrStatusText.text = `want: ${want} | got: ${got}`;
            }

            const STOPWORDS = new Set([
              'the',
              'a',
              'an',
              'of',
              'on',
              'in',
              'with',
              'and',
              'to',
              'for',
              'piece',
              'item',
              'thing',
              'object',
              'small',
              'large',
              'big',
              'tiny',
              'white',
              'black',
              'red',
              'blue',
              'green',
              'yellow',
              'gray',
              'grey',
              'brown',
              'tall',
              'short',
              'wide',
            ]);
            const tokens = (s) =>
              (s || '')
                .toLowerCase()
                .split(/[^a-z0-9]+/)
                .filter((t) => t && !STOPWORDS.has(t));
            const SYNONYMS = {
              couch: ['sofa'],
              sofa: ['couch'],
              tv: ['television'],
              television: ['tv'],
              fridge: ['refrigerator'],
              refrigerator: ['fridge'],
              mug: ['cup'],
              cup: ['mug'],
              picture: ['painting', 'artwork', 'art'],
              painting: ['picture', 'artwork', 'art'],
              artwork: ['picture', 'painting', 'art'],
            };
            const expand = (s) => {
              const t = (s || '').toLowerCase().trim();
              return [t, ...(SYNONYMS[t] || [])];
            };
            const used = new Set();
            const findMatch = (text) => {
              const needles = expand(text);
              const free = detected.filter((d) => !used.has(d));
              for (const needle of needles) {
                const exact =
                  free.find((d) => d.label?.toLowerCase().includes(needle)) ||
                  free.find((d) =>
                    needle.includes(d.label?.toLowerCase() || '\0')
                  );
                if (exact) return exact;
              }
              const wantTokens = new Set(tokens(text));
              if (wantTokens.size === 0) return null;
              return (
                free.find((d) => {
                  for (const t of tokens(d.label)) {
                    if (wantTokens.has(t)) return true;
                  }
                  return false;
                }) || null
              );
            };
            const MAX_ANCHOR_DIST = 8;
            const camForRange = xb.core.camera;
            const camPosForRange = new THREE.Vector3();
            if (camForRange) camForRange.getWorldPosition(camPosForRange);
            const snapRaycaster = new THREE.Raycaster();
            const snapToDepth = (target) => {
              const depthMesh = xb.core.depth?.depthMesh;
              if (!depthMesh) return null;
              const dir = target.clone().sub(camPosForRange).normalize();
              snapRaycaster.set(camPosForRange, dir);
              snapRaycaster.far = MAX_ANCHOR_DIST;
              const hits = [];
              depthMesh.raycast(snapRaycaster, hits);
              return hits.length ? hits[0].point.clone() : null;
            };
            const batchKey = `b${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
            const placed = [];
            list.forEach((item, i) => {
              let match = findMatch(item.text);
              const initialMatch = match;
              if (match && camForRange) {
                const d = camPosForRange.distanceTo(match.position);
                if (d > MAX_ANCHOR_DIST) {
                  const snapped = snapToDepth(match.position);
                  if (snapped) {
                    match = {...match, position: snapped};
                  } else {
                    match = null;
                  }
                }
              }
              const itemStyle = item.style || 'dot';
              if (match) {
                used.add(match);
                placeMarker(
                  match.position,
                  match.label || item.text,
                  itemStyle,
                  batchKey
                );
                placed.push({
                  placed: match.label,
                  requested: item.text,
                  style: itemStyle,
                  anchored: true,
                });
              } else {
                placed.push({
                  requested: item.text,
                  style: itemStyle,
                  anchored: false,
                  reason: 'not_found',
                });
              }
            });
            const result = {
              success: true,
              data: {
                placed,
                detected: detected.map((d) => d.label),
              },
            };
            placeLabel._lastResult = result;
            return result;
          },
        });

        const lookCloser = new xb.Tool({
          name: 'lookCloser',
          description:
            "Find which object the user's reticle is currently aimed at. " +
            "Returns the object name, or 'nothing' if the reticle is in empty space.",
          onTriggered: async () => {
            try {
              const target = xb.core.world.lookingAt();
              return {
                success: true,
                data: {target: target?.name || target?.type || 'nothing'},
              };
            } catch (err) {
              console.warn('[lookCloser] error', err);
              return {success: false, error: err.message};
            }
          },
        });

        return [placeLabel, lookCloser];
      }

      function placeMarker(position, text, style, batchKey) {
        // Dedupe: same physical object should only get one label. Match by
        // text (exact, contains, or contained), then by proximity. Skip
        // labels added in the same batch — caller asked for multiple
        // distinct items, so don't merge them with each other.
        const norm = (s) => (s || '').toLowerCase().trim();
        const key = norm(text);
        const candidates = labels.children.filter(
          (g) => !batchKey || g.userData.batchKey !== batchKey
        );
        let existing = candidates.find((g) => {
          const other = norm(g.userData.text);
          if (other === key) return true;
          if (key && other && (other.includes(key) || key.includes(other))) {
            return true;
          }
          return false;
        });
        if (existing) {
          if (existing.userData.style !== style) {
            labels.remove(existing);
          } else {
            existing.position.copy(position);
            existing.userData.t0 = performance.now() / 1000;
            existing.userData.text = text;
            const labelChild = existing.children.find(
              (c) => c.isText || c.text
            );
            if (labelChild && 'text' in labelChild) {
              labelChild.text = text;
              labelChild.sync && labelChild.sync();
            }
            return;
          }
        }

        const group = new THREE.Group();
        group.position.copy(position);
        group.userData.style = style;
        group.userData.text = text;
        group.userData.t0 = performance.now() / 1000;
        group.userData.batchKey = batchKey;
        if (style === 'arrow') {
          const arrow = buildArrow();
          arrow.position.set(0, 0.25, 0);
          group.add(arrow);
          group.userData.arrow = arrow;
        } else if (style === 'pulse') {
          const ring = buildPulseRing();
          group.add(ring);
          group.userData.ring = ring;
        } else {
          const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.04, 16, 16),
            new THREE.MeshBasicMaterial({color: 0xffd54f})
          );
          group.add(sphere);
        }
        const label = new Text();
        label.text = text;
        label.fontSize = 0.05;
        label.color = 0xffffff;
        label.outlineWidth = 0.004;
        label.outlineColor = 0x000000;
        label.anchorX = 'center';
        label.anchorY = 'bottom';
        label.position.set(0, style === 'arrow' ? 0.4 : 0.06, 0);
        label.depthOffset = -1;
        label.renderOrder = 999;
        label.material.depthTest = false;
        label.material.depthWrite = false;
        label.material.transparent = true;
        group.add(label);
        label.sync();
        labels.add(group);
      }

      function buildArrow() {
        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({color: 0x42a5f5});
        const stem = new THREE.Mesh(
          new THREE.CylinderGeometry(0.012, 0.012, 0.12, 12),
          mat
        );
        stem.position.y = 0.08;
        const tip = new THREE.Mesh(
          new THREE.ConeGeometry(0.035, 0.06, 16),
          mat
        );
        tip.position.y = 0;
        tip.rotation.x = Math.PI;
        group.add(stem);
        group.add(tip);
        return group;
      }

      function buildPulseRing() {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.05, 0.06, 32),
          new THREE.MeshBasicMaterial({
            color: 0xff8a65,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
          })
        );
        ring.rotation.x = -Math.PI / 2;
        return ring;
      }

      const _camWorldPos = new THREE.Vector3();
      function animateMarkers() {
        const now = performance.now() / 1000;
        const cam = xb.core.camera;
        if (cam) cam.getWorldPosition(_camWorldPos);
        for (const g of labels.children) {
          const dt = now - (g.userData.t0 || now);
          if (g.userData.style === 'arrow' && g.userData.arrow) {
            g.userData.arrow.position.y = 0.25 + Math.sin(dt * 3) * 0.02;
          } else if (g.userData.style === 'pulse' && g.userData.ring) {
            const phase = (dt % 1.5) / 1.5;
            const s = 1 + phase * 3;
            g.userData.ring.scale.setScalar(s);
            g.userData.ring.material.opacity = 0.9 * (1 - phase);
          }
          if (cam) {
            for (const c of g.children) {
              if (typeof c.text === 'string') {
                // Troika Text reads from its local -Z side, so aim that at
                // the camera with a plain lookAt.
                c.lookAt(_camWorldPos);
              }
            }
          }
        }
        requestAnimationFrame(animateMarkers);
      }
      requestAnimationFrame(animateMarkers);

      async function start() {
        if (session) return;
        startBtn.disabled = true;
        setStatus('opening session...');
        transcriptBuffer = '';
        transcriptEl.innerHTML = '';
        try {
          // Clear any leftover labels from prior session to avoid stacking.
          while (labels.children.length) {
            const c = labels.children.pop();
            c.traverse?.((n) => {
              n.geometry?.dispose?.();
              n.material?.dispose?.();
            });
            labels.remove(c);
          }
          await xb.core.sound.enableAudio({streamToAI: true});
          session = await xb.core.world.streamScene(
            'You are a helpful AR companion. The user is wearing a headset ' +
              'and you receive their camera every second. Keep replies short ' +
              'and conversational. Only call placeLabel when the user ' +
              'explicitly asks you to label, point to, or mark something — ' +
              'never proactively label things you happen to see. Use ' +
              "lookCloser when the user asks about what they're pointing at. " +
              'When you tell the user you are about to label, point to, or ' +
              'mark something, you must call placeLabel in the same turn — ' +
              'never promise to do it later or in a follow-up message.',
            {
              fps: 1,
              tools: makeTools(),
              onOpen: () => setStatus('listening'),
              onText: (t) => appendTranscript(t),
              onError: (e) => {
                setStatus('error: ' + e.message);
                console.error(e);
              },
              onClose: () => {
                setStatus('closed');
                startBtn.disabled = false;
                stopBtn.disabled = true;
              },
            }
          );
          stopBtn.disabled = false;
        } catch (err) {
          setStatus('error: ' + err.message);
          startBtn.disabled = false;
          console.error(err);
        }
      }

      async function stop() {
        if (!session) return;
        stopBtn.disabled = true;
        setStatus('stopping...');
        try {
          await session?.stop();
          await xb.core.sound.disableAudio();
        } finally {
          session = null;
          startBtn.disabled = false;
          setStatus('idle');
        }
      }

      function clearLabels() {
        while (labels.children.length) {
          const c = labels.children.pop();
          c.traverse((n) => {
            n.geometry?.dispose();
            n.material?.dispose();
          });
          labels.remove(c);
        }
      }

      startBtn.addEventListener('click', start);
      stopBtn.addEventListener('click', stop);
      clearBtn.addEventListener('click', clearLabels);

      const options = new xb.Options();
      options.enableUI();
      options.enableAI();
      options.enableCamera();
      options.enableDepth();
      options.depth.depthMesh.updateFullResolutionGeometry = true;
      options.depth.depthMesh.renderShadow = true;
      options.depth.depthTexture.enabled = false;
      options.depth.matchDepthView = false;
      options.enableObjectDetection();
      options.world.objects.backendConfig.activeBackend = 'gemini';
      options.world.objects.showDebugVisualizations = false;
      options.reticles.enabled = true;
      options.setAppTitle('World Companion');

      xb.init(options);
      xb.core.scene.add(labels);

      const xrPanel = new xb.SpatialPanel({
        width: 0.3,
        height: 0.12,
        backgroundColor: '#000000d9',
        showEdge: false,
      });
      xrPanel.position.set(0, 1.3, -0.7);
      xb.core.user.add(xrPanel);

      const xrGrid = xrPanel.addGrid();
      const statusRow = xrGrid.addRow({weight: 0.3});
      const ctrlRow = xrGrid.addRow({weight: 0.7});

      xrStatusText = statusRow.addText({
        text: 'idle',
        fontColor: '#cfcfcf',
        fontSize: 0.13,
        textAlign: 'center',
      });

      const xrStartBtn = ctrlRow.addCol({weight: 1}).addIconButton({
        text: 'mic',
        fontSize: 0.6,
        fontColor: '#ffffff',
      });
      xrStartBtn.onTriggered = start;

      const xrStopBtn = ctrlRow.addCol({weight: 1}).addIconButton({
        text: 'stop',
        fontSize: 0.6,
        fontColor: '#ffffff',
      });
      xrStopBtn.onTriggered = stop;

      const xrClearBtn = ctrlRow.addCol({weight: 1}).addIconButton({
        text: 'delete_sweep',
        fontSize: 0.5,
        fontColor: '#ffffff',
      });
      xrClearBtn.onTriggered = clearLabels;

      xrPanel.updateLayouts();
    </script>
  </body>
</html>
